<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل گزارش‌گیری - سیستم اکسل</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #217346;
            --dark-blue-hl: #004a99;
            --dark-green-hl: #006400;
            --text-white: #ffffff;
        }

        body { font-family: Tahoma, Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-bar { 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 15px; 
            padding: 12px 15px; 
            background: #e9ecef; 
            border-radius: 5px; 
            font-size: 14px; 
            font-weight: bold; 
            gap: 8px;
            border-right: 5px solid var(--primary);
        }
        .header-line1 { color: #d9534f; }
        .header-line2 { color: #0c5460; }
        
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { border: none; padding: 10px 20px; cursor: pointer; background: #ddd; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .table-container { overflow-x: auto; border: 1px solid #eee; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; direction: rtl; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; white-space: nowrap; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        
        /* کلاس‌های رنگی اختصاصی */
        .bg-dark-blue-highlight { background-color: var(--dark-blue-hl) !important; color: var(--text-white) !important; }
        .bg-dark-green-highlight { background-color: var(--dark-green-hl) !important; color: var(--text-white) !important; }
        
        /* استایل دکمه‌های انتقال به شیت‌های عددی */
        .open-sheet-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        .open-sheet-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .loading { text-align: center; color: #666; padding: 50px; }
        .back-link { display: inline-block; margin-bottom: 15px; padding: 8px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="loading">در حال بارگذاری فایل اطلاعات...</div>
    
    <div id="info-header" class="header-bar" style="display:none;">
        <div id="msg-line1" class="header-line1">آخرین به روزرسانی: در حال محاسبه...</div>
        <div id="msg-line2" class="header-line2">محاسبات امتیاز وام در روز در حال محاسبه...</div>
    </div>
    
    <div id="tabs-container" class="nav-bar" style="display:none;"></div>
    <div id="back-area"></div>
    <div class="table-container" id="content-viewer"></div>
</div>

<script>
    const EXCEL_FILE = 'data.xlsm';
    const MAIN_SHEETS = ['member', 'bank', 'cash', 'loan', 'temp2'];
    let workbook = null;
    let date = "";
    let we = ""; 

    async function init() {
        try {
            const response = await fetch(`${EXCEL_FILE}?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error("فایل اکسل پیدا نشد");
            const data = await response.arrayBuffer();
            
            workbook = XLSX.read(data, {
                type: 'array',
                cellNF: true,
                cellText: true,
                cellDates: true
            });

            calculateUpdateDate();
            extractWeVar();
            updateHeaders();

            document.getElementById('status').style.display = 'none';
            document.getElementById('info-header').style.display = 'flex';
            document.getElementById('tabs-container').style.display = 'flex';
            
            renderMainTabs();
            loadSheet('member');
        } catch (e) {
            document.getElementById('status').innerText = "خطا: " + e.message;
        }
    }

    function calculateUpdateDate() {
        const sheet = workbook.Sheets['bank'];
        if (!sheet) return;
        const range = XLSX.utils.decode_range(sheet['!ref']);
        let maxDate = "";
        
        for (let r = range.s.r; r <= range.e.r; r++) {
            const cell = sheet[XLSX.utils.encode_cell({r: r, c: 3})];
            if (cell && cell.w) {
                const val = cell.w.trim();
                if (val !== "" && val !== "تاریخ" && !isNaN(parseInt(val[0]))) {
                    if (val > maxDate) maxDate = val;
                }
            }
        }
        date = maxDate || "نامشخص";
    }

    function extractWeVar() {
        const sheet = workbook.Sheets['temp2'];
        if (sheet && sheet['G1']) {
            we = sheet['G1'].w || sheet['G1'].v || "";
            we = we.toString().trim();
        } else {
            we = "نامشخص";
        }
    }

    function updateHeaders() {
        document.getElementById('msg-line1').innerText = `آخرین به روزرسانی: ${date} اگر هر تراکنشی بعد از تاریخ بروزرسانی باشد در آپدیت بعدی لحاظ می شود`;
        document.getElementById('msg-line2').innerText = `محاسبات امتیاز وام در روز ${we} انجام شده است   (قابل نمایش در برگه TEMP2)`;
    }

    function renderMainTabs() {
        const container = document.getElementById('tabs-container');
        container.innerHTML = ""; // ریست کردن تب‌ها
        
        MAIN_SHEETS.forEach(name => {
            if (workbook.SheetNames.includes(name)) {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.id = 'btn-' + name;
                btn.innerText = name.toUpperCase();
                btn.onclick = () => loadSheet(name);
                container.appendChild(btn);
            }
        });
    }

    function loadSheet(sheetName) {
        const worksheet = workbook.Sheets[sheetName];
        if (!worksheet) return;

        // هایلایت کردن تب انتخاب شده (فقط برای تب‌های اصلی)
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const tabBtn = document.getElementById('btn-' + sheetName);
        if (tabBtn) tabBtn.classList.add('active');

        // دکمه بازگشت (اگر شیت عددی یا غیر از member باز شده باشد)
        const backArea = document.getElementById('back-area');
        backArea.innerHTML = sheetName !== 'member' ? `<button class="back-link" onclick="loadSheet('member')">⬅ بازگشت به MEMBER</button>` : '';

        // نمایش جدول خام
        let html = XLSX.utils.sheet_to_html(worksheet);
        document.getElementById('content-viewer').innerHTML = html;
        const table = document.querySelector("#content-viewer table");

        // اعمال منطق اختصاصی هر شیت و فیلتر ستون‌ها
        if (sheetName === 'member') {
            highlightRowRange(table, 0, 0, 4, 'bg-dark-blue-highlight'); // ردیف 1 تا E
            highlightRowRange(table, 2, 0, 4, 'bg-dark-green-highlight'); // ردیف 3 تا E
            hideColumnsFrom(table, 5); // مخفی‌سازی ستون‌های F به بعد (ایندکس 5 به بعد)
            
            // تولید دکمه‌های عملیات برای کدهای 11 تا 35
            addMemberRowButtons(table);
        } 
        else if (sheetName === 'bank') {
            highlightRowRange(table, 0, 0, 6, 'bg-dark-blue-highlight'); // ردیف 1 تا G
            highlightRowRange(table, 6, 0, 6, 'bg-dark-green-highlight'); // ردیف 7 تا G
            highlightRowRange(table, 7, 0, 6, 'bg-dark-green-highlight'); // ردیف 8 تا G
            hideColumnsFrom(table, 7); // مخفی‌سازی ستون‌های H به بعد (ایندکس 7 به بعد)
        } 
        else if (sheetName === 'cash') {
            highlightRowRange(table, 0, 0, 6, 'bg-dark-blue-highlight'); // ردیف 1 تا G
            highlightRowRange(table, 4, 0, 6, 'bg-dark-green-highlight'); // ردیف 5 تا G
            highlightRowRange(table, 5, 0, 6, 'bg-dark-green-highlight'); // ردیف 6 تا G
            hideColumnsFrom(table, 7); // مخفی‌سازی ستون‌های H به بعد (ایندکس 7 به بعد)
        } 
        else if (sheetName === 'loan') {
            highlightRowRange(table, 0, 0, 7, 'bg-dark-blue-highlight'); // ردیف 1 تا H
            highlightRowRange(table, 2, 0, 7, 'bg-dark-green-highlight'); // ردیف 3 تا H
            highlightRowRange(table, 3, 0, 7, 'bg-dark-green-highlight'); // ردیف 4 تا H
            hideColumnsFrom(table, 8); // مخفی‌سازی ستون‌های I به بعد (ایندکس 8 به بعد)
        }
        else if (sheetName === 'temp2') {
            highlightRowRange(table, 0, 0, 5, 'bg-dark-green-highlight'); // ردیف 1 تا F
            hideColumnsFrom(table, 6); // مخفی‌سازی ستون‌های G به بعد (ایندکس 6 به بعد)
        }
    }

    // توابع کمکی هایلایت و مخفی سازی
    function highlightRowRange(table, rIdx, startC, endC, cls) {
        if (!table.rows[rIdx]) return;
        for (let c = startC; c <= endC; c++) {
            if (table.rows[rIdx].cells[c]) table.rows[rIdx].cells[c].className = cls;
        }
    }

    function hideColumnsFrom(table, startC) {
        for (let r = 0; r < table.rows.length; r++) {
            for (let c = startC; c < table.rows[r].cells.length; c++) {
                if (table.rows[r].cells[c]) table.rows[r].cells[c].style.display = 'none';
            }
        }
    }

    // تابع افزودن ستون دکمه‌ها به انتهای هر ردیف شیت member
    function addMemberRowButtons(table) {
        if (!table) return;
        const headerRow = table.rows[0];
        if (!headerRow) return;

        // بررسی جهت جلوگیری از ایجاد ستون تکراری
        if (headerRow.cells[0] && headerRow.cells[0].dataset && headerRow.cells[0].dataset.actionCol === "1") {
            return;
        }

        // ایجاد ستون جدید عملیات در سمت راست جدول (اولین ستون در RTL)
        const th = document.createElement('th');
        th.innerText = "عملیات شیت";
        th.dataset.actionCol = "1";
        headerRow.insertBefore(th, headerRow.cells[0] || null);

        // پیمایش ردیف‌ها برای درج دکمه در صورت تطابق کد
        for (let r = 1; r < table.rows.length; r++) {
            const row = table.rows[r];
            const code = findCodeInRow(row);
            const td = document.createElement('td');

            if (code !== null) {
                const targetSheet = String(code);
                const btn = document.createElement('button');
                btn.className = "open-sheet-btn";
                btn.type = "button";
                btn.innerText = `نمایش شیت ${targetSheet}`;

                // غیرفعال کردن دکمه در صورت موجود نبودن شیت مورد نظر
                if (!workbook || !workbook.SheetNames.includes(targetSheet)) {
                    btn.disabled = true;
                    btn.title = `شیت شماره ${targetSheet} در این فایل یافت نشد.`;
                } else {
                    btn.onclick = () => loadSheet(targetSheet);
                }
                td.appendChild(btn);
            } else {
                td.innerHTML = "-";
            }
            row.insertBefore(td, row.cells[0] || null);
        }
    }

    // استخراج شماره شیت (کدهای بین 11 تا 35) از ردیف
    function findCodeInRow(row) {
        if (!row || !row.cells) return null;
        
        // از آنجا که ستون F به بعد مخفی شده، ما فقط ستون‌های اولیه (A تا E) را جستجو می‌کنیم
        for (let c = 0; c < row.cells.length; c++) {
            const textVal = (row.cells[c].innerText || "").trim();
            
            // اگر سلول فقط شامل عدد خالص بود
            if (/^\d+$/.test(textVal)) {
                const num = parseInt(textVal, 10);
                if (num >= 11 && num <= 35) return num;
            }
            
            // اگر عدد داخل عبارات متنی بود (مثال: "کد 24" یا "عضو 15")
            const match = textVal.match(/\b(1[1-9]|2[0-9]|3[0-5])\b/);
            if (match) {
                return parseInt(match[1], 10);
            }
        }
        return null;
    }

    init();
</script>
</body>
</html>
